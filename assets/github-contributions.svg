<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-labelledby="title desc">
  <title id="title">GitHub contribution goals</title>
  <desc id="desc">Serhii has passed 10,000 GitHub contributions and is aiming for 50,000 by the end of 2026.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <rect width="494" height="194" x="0.5" y="0.5" rx="6" fill="url(#bg)" stroke="#30363d"/>
  <text x="28" y="38" fill="#58a6ff" font-family="Segoe UI, Ubuntu, sans-serif" font-size="18" font-weight="700">GitHub contributions</text>
  <text x="28" y="69" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14">Static card. No third-party stats renderer.</text>

  <g transform="translate(28 94)">
    <rect width="439" height="14" rx="7" fill="#21262d"/>
    <rect width="88" height="14" rx="7" fill="url(#line)"/>
    <circle cx="88" cy="7" r="8" fill="#58a6ff"/>
  </g>

  <g font-family="Segoe UI, Ubuntu, sans-serif">
    <text x="28" y="136" fill="#f0f6fc" font-size="26" font-weight="700">10,000+ reached</text>
    <text x="306" y="136" fill="#f0f6fc" font-size="26" font-weight="700" text-anchor="middle">50,000 target</text>
    <text x="28" y="162" fill="#8b949e" font-size="13">Next milestone: total contributions by end of 2026</text>
    <text x="467" y="162" fill="#8b949e" font-size="13" text-anchor="end">See live graph on GitHub</text>
  </g>
</svg>
